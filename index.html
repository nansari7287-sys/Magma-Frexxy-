        // Python dictionary cleaner
        function extractPureJSON(text) {
            try {
                let startDict = text.indexOf('{');
                let startList = text.indexOf('[');
                let startIndex = -1;
                
                if(startDict !== -1 && startList !== -1) startIndex = Math.min(startDict, startList);
                else if (startDict !== -1) startIndex = startDict;
                else if (startList !== -1) startIndex = startList;

                if(startIndex !== -1) {
                    let endDict = text.lastIndexOf('}');
                    let endList = text.lastIndexOf(']');
                    let endIndex = Math.max(endDict, endList);
                    
                    if(endIndex > startIndex) {
                        let jsonStr = text.substring(startIndex, endIndex + 1);
                        jsonStr = jsonStr.replace(/'/g, '"');
                        jsonStr = jsonStr.replace(/True/g, 'true').replace(/False/g, 'false').replace(/None/g, 'null');
                        jsonStr = jsonStr.replace(/,\s*([\]}])/g, '$1'); 
                        return JSON.parse(jsonStr);
                    }
                }
            } catch (e) { }
            return null;
        }

        // Perfect Alignment Engine
        function formatHackerData(data) {
            let ordered_keys = ["registrationnumber", "registrationdate", "validtill", "name", "fathername", "ownertypecode", "mobilenumber", "mobile", "address", "city", "pincode", "email", "id", "circle", "alt"];
            
            if (data.results && Array.isArray(data.results)) { data = data.results; }
            if (data.data) { data = data.data; }
            if (data.result) { data = data.result; }
            
            function flatten(item, depth = 0) {
                let out = "";
                let space = "  ".repeat(depth);

                if (typeof item === 'object' && item !== null && !Array.isArray(item)) {
                    for (let key of ordered_keys) {
                        let actual_key = Object.keys(item).find(k => k.toLowerCase() === key);
                        if (actual_key && item[actual_key] !== "" && item[actual_key] !== null) {
                            out += `${space}  <span class="c">${actual_key.toUpperCase().padEnd(20)}</span><span class="w">:</span> <span class="g">${item[actual_key]}</span>\n`;
                        }
                    }
                    for (let [k, v] of Object.entries(item)) {
                        let kl = k.toLowerCase();
                        if (ordered_keys.includes(kl) || ['status', 'count', 'search time', 'success', 'error', 'developer', 'message', 'cache', 'credit'].includes(kl)) continue;
                        
                        if (typeof v === 'object' && v !== null && Object.keys(v).length > 0) {
                            out += `\n${space}<span class="y">‚Ėľ‚Ėľ [ ${k.toUpperCase()} ] ‚Ėľ‚Ėľ</span>\n` + flatten(v, depth + 1);
                        } else if (v !== null && v !== "" && v !== " ") {
                            out += `${space}  <span class="c">${k.toUpperCase().padEnd(20)}</span><span class="w">:</span> <span class="g">${v}</span>\n`;
                        }

                } else if (Array.isArray(item)) {

                    });
                } else {
                    out += `${space}  <span class="g">>> ${item}</span>\n`;
                }
                return out;
            }
            return flatten(data);
        }

            let rawText = "";

            // Proxies list to cycle through if one blocks

                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 6000); // 6 seconds wait per node
                    
                    const response = await fetch(fetchMethods[i], { signal: controller.signal });
                    clearTimeout(timeoutId);
                    
                    if(response.ok) {
                        let text = await response.text();
                        if (text.trim() !== "" && !text.includes("<html")) { // ensure it's not a block page

                            fetchSuccess = true;
